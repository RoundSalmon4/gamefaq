name: Download GameFAQ

on:
  workflow_dispatch:
    inputs:
      faq_url:
        description: "GameFAQs URL to download"
        required: true
        type: string
      commit_message:
        description: "Commit message"
        required: false
        default: "Add FAQ guide"
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        options: >-
          --health-cmd "curl -f http://localhost:8191/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Wait for FlareSolverr
        run: |
          echo "Waiting for FlareSolverr to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8191/ > /dev/null 2>&1; then
              echo "FlareSolverr is ready."
              exit 0
            fi
            sleep 2
          done
          echo "FlareSolverr failed to start within 60s"
          exit 1

      - name: Download FAQ
        run: python download_faq.py "${{ inputs.faq_url }}" -o guides --flaresolverr http://localhost:8191

      - name: Commit and push
        run: |
          git config user.name "roundsalmon4"
          git config user.email "209016228+RoundSalmon4@users.noreply.github.com"
          git add -f guides/
          if git diff --cached --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
          fi

name: Download GameFAQ

on:
  workflow_dispatch:
    inputs:
      faq_url:
        description: "GameFAQs URL to download"
        required: true
        type: string
      commit_message:
        description: "Commit message"
        required: false
        default: "Add FAQ guide"
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Download FAQ
        run: python download_faq.py "${{ inputs.faq_url }}" -o guides

      - name: Commit and push
        run: |
          git config user.name "roundsalmon4"
          git config user.email "209016228+RoundSalmon4@users.noreply.github.com"
          git add guides/
          if git diff --cached --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
          fi
